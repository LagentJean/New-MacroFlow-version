<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="robots" content="noindex" />
  <title>Réparation MacroFlow</title>
  <style>
    :root{color-scheme:dark;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    body{margin:0;min-height:100svh;display:grid;place-items:center;background:#0d0d10;color:#fff;padding:24px;box-sizing:border-box}
    main{width:min(440px,100%);padding:24px;border:1px solid #343039;border-radius:22px;background:#17141b;box-shadow:0 20px 70px rgba(0,0,0,.35)}
    h1{margin:0 0 10px;font-size:24px}p{color:#b7b1bc;line-height:1.5}.status{margin-top:18px;padding:14px;border-radius:14px;background:#211d25;font-weight:750}.ok{color:#65d98a}.bad{color:#ff746d}.small{font-size:13px;color:#8f8994}
    button{width:100%;margin-top:16px;padding:13px;border:0;border-radius:13px;background:#bf5af2;color:white;font:inherit;font-weight:800}
  </style>
</head>
<body>
  <main>
    <h1>Réparation de MacroFlow</h1>
    <p>Cette page enlève uniquement les anciens caches et le service worker bloqué. Elle ne supprime pas ton profil, tes repas ni tes entraînements.</p>
    <div id="status" class="status">Nettoyage en cours…</div>
    <p class="small">Garde cette page ouverte quelques secondes.</p>
    <button id="retry" type="button" hidden>Réessayer</button>
  </main>
<script>
(() => {
  const status = document.getElementById('status');
  const retry = document.getElementById('retry');

  async function repair() {
    retry.hidden = true;
    status.className = 'status';
    status.textContent = 'Nettoyage en cours…';

    try {
      if ('serviceWorker' in navigator) {
        const registrations = await navigator.serviceWorker.getRegistrations();
        for (const registration of registrations) {
          try { await registration.update(); } catch (_) {}
          await registration.unregister();
        }
      }

      if ('caches' in window) {
        const names = await caches.keys();
        await Promise.all(names.map((name) => caches.delete(name)));
      }

      status.className = 'status ok';
      status.textContent = 'Nettoyage terminé. Ouverture de la version stable…';
      window.setTimeout(() => {
        window.location.replace('./?iphoneFresh=' + Date.now());
      }, 1400);
    } catch (error) {
      status.className = 'status bad';
      status.textContent = 'Le nettoyage a échoué : ' + (error?.message || String(error));
      retry.hidden = false;
    }
  }

  retry.addEventListener('click', repair);
  repair();
})();
</script>
</body>
</html>
