<!doctype html>
<html lang="fr-CA">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Réparation MacroFlow v34.2</title>
<style>
:root{color-scheme:dark}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#090909;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:24px}.card{width:min(430px,100%);padding:28px;border:1px solid #342a3b;border-radius:24px;background:linear-gradient(145deg,#1b171f,#111);box-shadow:0 24px 80px #0008;text-align:center}.bolt{font-size:46px}.spin{width:28px;height:28px;margin:20px auto;border:3px solid #3a3041;border-top-color:#bf5af2;border-radius:50%;animation:s .8s linear infinite}@keyframes s{to{transform:rotate(360deg)}}h1{font-size:24px;margin:12px 0 8px}p{color:#aaa;line-height:1.45;margin:0}.ok{color:#65df82}.error{color:#ff8d8d}button{display:none;width:100%;margin-top:18px;border:0;border-radius:14px;padding:14px;background:#bf5af2;color:#fff;font-weight:800;font-size:16px}
</style>
</head>
<body>
<main class="card"><div class="bolt">⚡</div><h1>Réparation de MacroFlow</h1><div id="spinner" class="spin"></div><p id="status">Suppression de la boucle de chargement…</p><button id="continue">Ouvrir MacroFlow</button></main>
<script>
(async()=>{
 const status=document.getElementById('status'),spinner=document.getElementById('spinner'),button=document.getElementById('continue');
 const go=()=>location.replace('./index.html?v=342&repaired='+Date.now());
 try{
   if('serviceWorker' in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()));}
   if('caches' in window){const names=await caches.keys();await Promise.all(names.filter(n=>n.startsWith('macroflow-')).map(n=>caches.delete(n)));}
   status.textContent='Cache cassé retiré. Tes repas, ton profil et tes séances sont conservés.';status.className='ok';spinner.remove();button.style.display='block';button.addEventListener('click',go);setTimeout(go,1200);
 }catch(e){console.error(e);status.textContent='Nettoyage partiel. Touche le bouton pour continuer.';status.className='error';spinner.remove();button.style.display='block';button.addEventListener('click',go);}
})();
</script>
</body>
</html>
