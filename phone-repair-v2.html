<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="robots" content="noindex" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <title>Réparation MacroFlow v2</title>
  <style>
    :root{color-scheme:dark;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    body{margin:0;min-height:100svh;display:grid;place-items:center;background:#0d0d10;color:#fff;padding:24px;box-sizing:border-box}
    main{width:min(440px,100%);padding:24px;border:1px solid #343039;border-radius:22px;background:#17141b;box-shadow:0 20px 70px rgba(0,0,0,.35)}
    h1{margin:0 0 10px;font-size:24px}p{color:#b7b1bc;line-height:1.5}.status{margin-top:18px;padding:14px;border-radius:14px;background:#211d25;font-weight:750}.ok{color:#65d98a}.small{font-size:13px;color:#8f8994}
    button{width:100%;margin-top:16px;padding:13px;border:0;border-radius:13px;background:#bf5af2;color:white;font:inherit;font-weight:800}
  </style>
</head>
<body>
  <main>
    <h1>Réparation MacroFlow</h1>
    <p>Nettoyage des anciens caches sans supprimer ton profil, tes repas ni tes entraînements.</p>
    <div id="status" class="status">Nettoyage en cours…</div>
    <p class="small">Cette version continue automatiquement même si Safari bloque une étape.</p>
    <button id="open" type="button">Ouvrir MacroFlow maintenant</button>
  </main>
<script>
(() => {
  const status = document.getElementById('status');
  const open = document.getElementById('open');
  const target = './?iphoneFreshV2=' + Date.now();
  const timeout = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
  const limited = (promise, ms = 2500) => Promise.race([Promise.resolve(promise).catch(() => null), timeout(ms)]);
  const go = () => window.location.replace(target);
  open.addEventListener('click', go);

  async function repair() {
    try {
      if ('serviceWorker' in navigator) {
        const registrations = await limited(navigator.serviceWorker.getRegistrations(), 2500);
        if (Array.isArray(registrations)) {
          await limited(Promise.all(registrations.map((registration) => limited(registration.unregister(), 1500))), 3000);
        }
      }
      if ('caches' in window) {
        const names = await limited(caches.keys(), 2500);
        if (Array.isArray(names)) {
          await limited(Promise.all(names.map((name) => limited(caches.delete(name), 1500))), 3000);
        }
      }
    } finally {
      status.className = 'status ok';
      status.textContent = 'Nettoyage terminé. Ouverture de MacroFlow…';
      setTimeout(go, 900);
    }
  }

  setTimeout(go, 8000);
  repair();
})();
</script>
</body>
</html>
